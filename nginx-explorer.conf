# Nginx configuration for Chain Registry Web Explorer
# Serves the enhanced web explorer with proper caching and security headers

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy all node API requests to the chain-registry node.
    # This covers /v1/*, /health, and /metrics so the SPA can call the node
    # from the same origin (http://localhost:3000) without CORS issues.
    location /v1/ {
        proxy_pass http://node:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Proxy faucet API requests so the explorer SPA can call them from the
    # same origin (port 3000) without CORS issues.
    location /api/ {
        proxy_pass http://faucet:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass http://node:8080/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        # Fast local health check — does NOT proxy to the node.
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback - serve index.html for all routes not matched above
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML briefly so the browser picks up new deployments quickly.
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
