# Optional local Anvil stack (NOT used by default docker-compose.yml).
# Simulated L1 on chain 31337 — for offline contract dev only.
#
#   docker compose -f docker-compose.anvil.yml up -d

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1", "--accounts", "10"]
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/contracts
      - anvil-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  deploy-contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: creg-deploy
    entrypoint: []
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    command: ["/bin/sh", "-c", "forge build --force && forge script contracts/script/Deploy.s.sol --rpc-url http://anvil:8545 --broadcast --slow -vvvv"]
    environment:
      RPC_URL: http://anvil:8545
      DEPLOYER_KEY: ${DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      TESTNET_MODE: "true"

volumes:
  anvil-data:
