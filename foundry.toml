[profile.default]
src     = "contracts"
out     = "contracts/out"
libs    = ["contracts/lib"]
test    = "contracts/test"
script  = "contracts/script"
solc    = "0.8.24"
optimizer        = true
optimizer_runs   = 200
via_ir           = true
remappings = [
	"@openzeppelin/=contracts/lib/openzeppelin-contracts/",
]
fs_permissions = [
	{ access = "read-write", path = "./contracts/deployments" },
	{ access = "read-write", path = "./testnet/artifacts" },
]

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
sepolia   = "${SEPOLIA_RPC_URL}"
mainnet   = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = "mainnet" }
