# nsjail configuration for Chain Registry sandbox
# Protobuf-text-format config for nsjail (https://github.com/google/nsjail)
#
# This file is loaded via --config and provides a seccomp-BPF allowlist policy.
# Default-deny: all syscalls are blocked unless explicitly listed.
#
# IMPORTANT: This allowlist covers the minimal syscalls needed for package
# install hooks across all supported ecosystems (npm, pip, cargo, gem, mvn).

name: "creg-sandbox"
description: "Chain Registry package validation sandbox"

mode: ONCE

# ── Namespace Isolation ──────────────────────────────────────────────
clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# ── Resource Limits ──────────────────────────────────────────────────
# These can be overridden by CLI flags for per-package tuning.
rlimit_as_type: HARD
rlimit_as: 512
rlimit_cpu_type: HARD
rlimit_cpu: 120
rlimit_fsize_type: HARD
rlimit_fsize: 256
rlimit_nofile: 256

time_limit: 120
max_cpus: 1

# ── User Mapping ─────────────────────────────────────────────────────
uidmap {
    inside_id: "99999"
    outside_id: ""
    count: 1
}
gidmap {
    inside_id: "99999"
    outside_id: ""
    count: 1
}

keep_caps: false
keep_env: false

# ── Mount Points ─────────────────────────────────────────────────────
# Minimal mounts — overridden at runtime by the validator with the
# ecosystem-specific rootfs path.
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}
mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# /tmp writable for install hooks
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=256m"
}

# ── Seccomp-BPF Policy ──────────────────────────────────────────────
# Log all filtered syscalls for the behavioral observation parser.
seccomp_log: true

# Allowlisted syscalls — everything else is blocked and logged.
# Categories:
#   [FILE]    File I/O
#   [MEM]     Memory management
#   [PROC]    Process management
#   [NET]     Network (connect is logged for observation)
#   [SIGNAL]  Signal handling
#   [TIME]    Time and clock
#   [MISC]    Miscellaneous

# ── FILE ─────────────────────────────────────────────────────────────
seccomp_string: "ALLOW { read, write, open, openat, close, stat, fstat, lstat }"
seccomp_string: "ALLOW { newfstatat, lseek, pread64, pwrite64, readv, writev }"
seccomp_string: "ALLOW { access, faccessat, faccessat2, readlink, readlinkat }"
seccomp_string: "ALLOW { getcwd, rename, renameat, renameat2 }"
seccomp_string: "ALLOW { unlink, unlinkat, rmdir, mkdir, mkdirat }"
seccomp_string: "ALLOW { symlink, symlinkat, link, linkat }"
seccomp_string: "ALLOW { chmod, fchmod, fchmodat, chown, fchown, fchownat }"
seccomp_string: "ALLOW { utimensat, futimesat }"
seccomp_string: "ALLOW { getdents, getdents64 }"
seccomp_string: "ALLOW { dup, dup2, dup3, fcntl, ioctl }"
seccomp_string: "ALLOW { pipe, pipe2, eventfd, eventfd2 }"
seccomp_string: "ALLOW { epoll_create, epoll_create1, epoll_ctl, epoll_wait, epoll_pwait }"
seccomp_string: "ALLOW { poll, ppoll, select, pselect6 }"
seccomp_string: "ALLOW { flock, ftruncate, fallocate, copy_file_range }"
seccomp_string: "ALLOW { statfs, fstatfs, statx }"
seccomp_string: "ALLOW { sendfile }"

# ── MEM ──────────────────────────────────────────────────────────────
seccomp_string: "ALLOW { brk, mmap, munmap, mremap, mprotect, madvise }"
seccomp_string: "ALLOW { mincore, msync, memfd_create }"

# ── PROC ─────────────────────────────────────────────────────────────
seccomp_string: "ALLOW { execve, execveat, clone, clone3, fork, vfork }"
seccomp_string: "ALLOW { wait4, waitid, exit, exit_group }"
seccomp_string: "ALLOW { getpid, getppid, gettid, getuid, getgid, geteuid, getegid }"
seccomp_string: "ALLOW { getresuid, getresgid, getgroups, setgroups }"
seccomp_string: "ALLOW { set_tid_address, set_robust_list, get_robust_list }"
seccomp_string: "ALLOW { futex, futex_waitv }"
seccomp_string: "ALLOW { sched_getaffinity, sched_setaffinity, sched_yield }"
seccomp_string: "ALLOW { prctl, arch_prctl }"
seccomp_string: "ALLOW { prlimit64, getrlimit, setrlimit }"
seccomp_string: "ALLOW { capget }"

# ── NET ──────────────────────────────────────────────────────────────
# connect, sendto, recvfrom etc. are ALLOWED so they can be LOGGED.
# Network namespace isolation prevents actual egress; the syscalls
# themselves are captured by seccomp audit for the observation parser.
seccomp_string: "ALLOW { socket, connect, bind, listen, accept, accept4 }"
seccomp_string: "ALLOW { sendto, recvfrom, sendmsg, recvmsg }"
seccomp_string: "ALLOW { getsockopt, setsockopt, getsockname, getpeername }"
seccomp_string: "ALLOW { shutdown, socketpair }"

# ── SIGNAL ───────────────────────────────────────────────────────────
seccomp_string: "ALLOW { rt_sigaction, rt_sigprocmask, rt_sigreturn, sigaltstack }"
seccomp_string: "ALLOW { kill, tgkill, tkill }"

# ── TIME ─────────────────────────────────────────────────────────────
seccomp_string: "ALLOW { clock_gettime, clock_getres, clock_nanosleep }"
seccomp_string: "ALLOW { gettimeofday, nanosleep, timer_create }"
seccomp_string: "ALLOW { timer_settime, timer_gettime, timer_delete }"

# ── MISC ─────────────────────────────────────────────────────────────
seccomp_string: "ALLOW { uname, sysinfo, getrandom }"
seccomp_string: "ALLOW { rseq }"

# ── BLOCKED (implicit deny) ──────────────────────────────────────────
# The following are explicitly blocked and NOT in the allowlist:
#   ptrace, mount, umount2, pivot_root, chroot
#   reboot, swapon, swapoff, sethostname, setdomainname
#   kexec_load, init_module, finit_module, delete_module
#   acct, settimeofday, adjtimex
#   iopl, ioperm, modify_ldt
#   personality (with ADDR_NO_RANDOMIZE)
#   keyctl, bpf, userfaultfd, perf_event_open
