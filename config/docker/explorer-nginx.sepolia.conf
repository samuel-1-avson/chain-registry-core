server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /v1/public/events {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream/v1/events$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location ~ "^/v1/public/blocks/([A-Fa-f0-9]{64})$" {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream/v1/blocks/hash/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location ~ "^/v1/blocks/([A-Fa-f0-9]{64})$" {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream/v1/blocks/hash/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location ~ ^/v1/public/(.*)$ {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream/v1/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/v1/operator/(.*)$ {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream/v1/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Operator / internal routes (must match CREG_OPERATOR_API_KEY on the node).
    location = /v1/runtime/config {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Operator-Key docker-dev-operator-key;
        proxy_http_version 1.1;
    }

    location = /v1/nodes {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Operator-Key docker-dev-operator-key;
        proxy_http_version 1.1;
    }

    location = /v1/p2p/status {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Operator-Key docker-dev-operator-key;
        proxy_http_version 1.1;
    }

    location = /v1/pending {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Operator-Key docker-dev-operator-key;
        proxy_http_version 1.1;
    }

    location ^~ /v1/operator/ {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Operator-Key docker-dev-operator-key;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /v1/ {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /v1/relayer/ {
        set $relayer_upstream http://relayer:8083;
        proxy_pass $relayer_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location /v1/events {
        set $node_upstream http://node:8080;
        proxy_pass $node_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Sepolia JSON-RPC for browser wallet actions (no local Anvil in this stack).
    location = /rpc {
        proxy_pass https://ethereum-sepolia-rpc.publicnode.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host ethereum-sepolia-rpc.publicnode.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location /api/ {
        set $faucet_upstream http://faucet:8082;
        proxy_pass $faucet_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "ok";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
}
